<style>
  /*  こういう書き方したらcss指定できる */
  h1 {
    color: red;
  }
  p {
    font-size: 20px;
    /* フォント名にスペースがあるなら""で囲う */
    font-family: Arial;
    background-color: aquamarine;
    width: 100px;
    height: 40px;
  }
  /* .をつけたらクラスを指定できる */
  .test {
    color: red;
  }
</style>

<h1>テスト</h1>
<p>test</p>
<ul>
  <li class="test">テスト1</li>
  <li>テスト2</li>
  <li>テスト3</li>
</ul>
