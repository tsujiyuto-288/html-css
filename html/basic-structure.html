<!doctype html>
<!-- 日本語ページであることを示す。
検索エンジンに言語を伝えたり翻訳機能が言語を判断しやすくなる -->
<html lang="ja">
  <head>
    <!-- 文字コード -->
    <meta charset="UTF-8" />
    <!-- スマホでもみやすくするための表示設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- cssファイルの読み込み。relで役割を伝える。cssファイルの場合stylesheet -->
    <link rel="stylesheet" href="../css/basics.css" />
    <!-- サイトのアイコンはrel="icon" -->
    <link rel="icon" href="../images/test画像.png" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <h1>こんにちわ〜</h1>
    </header>
    <main></main>
    <footer></footer>
  </body>
</html>
